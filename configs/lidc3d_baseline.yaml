# 3D LIDC-IDRI Baseline Configuration
# ResEncUNet3D with Dice+CE, nnU-Net-style training

seed: 42

data:
  dataset: "lidc3d"
  root: "./data/lidc3d"
  num_workers: 4

preprocessing:
  patch_size: [64, 128, 128]   # D, H, W — nnU-Net-style 3D patch
  target_spacing: [1.0, 1.0, 1.0]
  ct_window: [-1000, 400]

model:
  in_channels: 1
  num_classes: 2
  base_features: 32
  max_features: 320
  n_stages: 5
  blocks_per_stage: 2
  deep_supervision: true
  dropout: 0.0
  evidential:
    enabled: false
  multi_annotator:
    enabled: false

training:
  method: "standard"
  epochs: 250
  batch_size: 2       # 3D volumes are memory-intensive
  optimizer:
    name: "sgd"
    lr: 0.01
  loss:
    name: "dice_ce"
    dice_weight: 1.0
    ce_weight: 1.0
  gradient_clip: 12.0
  mixed_precision: true
  early_stopping:
    patience: 50
    metric: "dice"
    mode: "max"

uncertainty:
  mc_dropout:
    enabled: false
  ensemble:
    enabled: false

inference:
  step_size: 0.5       # 50% overlap for sliding window
  batch_size: 2
  tta: true             # Test-time augmentation (mirror)

logging:
  save_dir: "./checkpoints/lidc3d_baseline"
  log_dir: "./logs/lidc3d_baseline"
  val_every: 10         # Validate every N epochs
