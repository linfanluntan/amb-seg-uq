version: '3.8'

services:
  amb-seg-uq:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: amb-seg-uq:latest
    container_name: amb-seg-uq
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../data:/workspace/data
      - ../checkpoints:/workspace/checkpoints
      - ../results:/workspace/results
      - ../logs:/workspace/logs
    shm_size: '16gb'
    command: >
      bash -c "echo 'Container ready. Run experiments with:' &&
               echo '  python train.py --config configs/lidc_baseline.yaml' &&
               bash"
    stdin_open: true
    tty: true
